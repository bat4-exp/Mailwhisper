<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Business Email</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="button-container">
            <button id="recordBtn">🎤 Record</button>
            <button id="settingsBtn">⚙️ Settings</button>
            <button id="copyBtn" style="display: none;">📋 Copy</button>
            <button id="clearBtn">🗑️ Clear</button>
            <button id="testBtn">🧪 Test</button> <!-- New button added -->

        </div>
        <textarea id="outputText" placeholder="Your business email will appear here..."></textarea>
    </div>
    
    <div id="settingsPopup" class="popup">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <h2>Settings</h2>
            <label for="jargon">Jargon Words:</label>
            <input type="text" id="jargon">
            <label for="header">Email Header:</label>
            <input type="text" id="header">
            <label for="footer">Email Footer:</label>
            <input type="text" id="footer">
            <label>
                <input type="checkbox" id="translateToggle"> Enable Translation
            </label>
            <select id="languageSelect" style="display: none;"></select>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
